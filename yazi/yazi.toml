[mgr]
ratio = [1, 2, 5]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
linemode = "size"
show_hidden = false
show_symlink = true
scrolloff = 5
mouse_events = ["click", "scroll"]
title_format = "Yazi: {cwd}"

[preview]
max_width = 600
max_height = 900
image_filter = "lanczos3"
image_quality = 75

[opener]
edit = [{ run = 'nvim %s', block = true, desc = "Neovim", for = "unix" }]
glow = [{ run = 'trae %s', desc = "Trae", for = "macos" }]
open = [{ run = 'open %s', desc = "Open", for = "macos" }]
reveal = [{ run = 'open -R %1', desc = "Reveal in Finder", for = "macos" }]

[open]
prepend_rules = [
  { url = "*.md", use = [
    "glow",
    "edit",
    "open",
    "reveal",
  ] },
  { mime = "text/*", use = [
    "edit",
    "open",
    "reveal",
  ] },
  { mime = "application/json", use = [
    "edit",
    "open",
    "reveal",
  ] },
  { mime = "*/javascript", use = [
    "edit",
    "open",
    "reveal",
  ] },
  { mime = "*/typescript", use = [
    "edit",
    "open",
    "reveal",
  ] },
  { mime = "*/x-yaml", use = [
    "edit",
    "open",
    "reveal",
  ] },
]

[tasks]
micro_workers = 10
macro_workers = 25
bizarre_retry = 5

[plugin]
prepend_fetchers = [{ id = "git", url = "*", run = "git", prio = "normal", group = "git" }]
prepend_previewers = [
    { url = "*.csv", run = "rich-preview"}, # for csv files
    { url = "*.md", run = "code" },
    { url = "*.rst", run = "rich-preview"}, # for restructured text (.rst) files
    { url = "*.ipynb", run = "rich-preview"}, # for jupyter notebooks (.ipynb)
    { url = "*.json", run = "rich-preview"}, # for json (.json) files
]
